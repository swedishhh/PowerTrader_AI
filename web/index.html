<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PowerTrader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Azeret+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ── Top Bar ── -->
<header id="topbar">
  <div class="topbar-row topbar-row-main">
    <div class="topbar-brand">
      <span class="brand-mark">⚡</span>
      <span class="brand-name">POWERTRADER</span>
    </div>
    <div class="topbar-vitals">
      <div class="vital-pill" id="pill-neural">
        <span class="pill-dot"></span>
        <span class="pill-label">Neural</span>
      </div>
      <div class="vital-pill" id="pill-trader">
        <span class="pill-dot"></span>
        <span class="pill-label">Trader</span>
      </div>
    </div>
    <div id="topbar-account"></div>
    <div class="topbar-actions">
      <button class="btn btn-primary" id="btn-start-all" title="Start neural runner and traders for all exchanges">Start All</button>
      <button class="btn btn-danger" id="btn-stop-all" style="display:none" title="Stop all running traders and the neural runner">Stop All</button>
      <div class="actions-menu" id="actions-menu">
        <button class="actions-trigger" id="btn-actions">
          <span class="actions-trigger-icon">⋮</span>
        </button>
        <div class="actions-dropdown" id="actions-dropdown">
          <div class="actions-heading">Actions</div>
          <button class="actions-item" id="btn-close-all">
            <span class="actions-item-dot" style="background:var(--red)"></span>
            <span class="actions-item-body">
              <span class="actions-item-label">Close All</span>
              <span class="actions-item-desc">Sell all positions, return to cash</span>
            </span>
          </button>
          <button class="actions-item" id="btn-train-all">
            <span class="actions-item-dot" style="background:var(--purple)"></span>
            <span class="actions-item-body">
              <span class="actions-item-label">Train All</span>
              <span class="actions-item-desc">Retrain neural models for all coins</span>
            </span>
          </button>
          <div class="actions-sep"></div>
          <button class="actions-item" id="btn-sync-control">
            <span class="actions-item-dot" style="background:var(--cyan)"></span>
            <span class="actions-item-body">
              <span class="actions-item-label">Sync Control</span>
              <span class="actions-item-desc">Match control balance to Kraken USD</span>
            </span>
          </button>
          <button class="actions-item" id="btn-clear-history">
            <span class="actions-item-dot" style="background:var(--text-muted)"></span>
            <span class="actions-item-body">
              <span class="actions-item-label">Clear History</span>
              <span class="actions-item-desc">Wipe account value chart data</span>
            </span>
          </button>
          <div class="actions-sep"></div>
          <button class="actions-item actions-item--danger" id="btn-reset-all">
            <span class="actions-item-dot" style="background:var(--red)"></span>
            <span class="actions-item-body">
              <span class="actions-item-label">Reset All</span>
              <span class="actions-item-desc">Stop, close, wipe everything — fresh start</span>
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ── Main Layout ── -->
<main id="app">
  <!-- Left: Signal Grid -->
  <section id="panel-signals" class="panel">
    <div class="panel-header">
      <h2>Coins</h2>
      <button class="btn-portfolio" id="acct-block-portfolio" title="View portfolio chart">Portfolio ◈</button>
      <div class="view-toggle" id="view-toggle" title="Toggle simple / detailed view">
        <button class="vtog-btn active" data-mode="simple">◇</button>
        <button class="vtog-btn" data-mode="detail">◈</button>
      </div>
    </div>
    <div id="signal-grid" class="signal-grid"></div>
  </section>

  <!-- Left Sash -->
  <div id="sash-left" class="sash"></div>

  <!-- Center: Chart + Detail -->
  <section id="panel-chart" class="panel">
    <div class="panel-header">
      <div class="chart-controls">
        <span class="chart-coin-name" id="chart-coin-label">Select a coin</span>
        <div class="tf-selector" id="tf-selector"></div>
      </div>
    </div>
    <div id="chart-container" class="chart-container"></div>
    <div id="chart-legend" class="chart-legend hidden"></div>
    <div id="coin-position" class="coin-position hidden"></div>
  </section>

  <!-- Sash -->
  <div id="sash" class="sash"></div>

  <!-- Right: Trades + Info -->
  <section id="panel-trades" class="panel">
    <div class="panel-header">
      <div class="tab-bar" id="trades-tabs">
        <button class="tab-btn active" data-tab="history">History</button>
        <button class="tab-btn" data-tab="compare">Compare</button>
        <button class="tab-btn" data-tab="lth">LTH</button>
        <button class="tab-btn" data-tab="training">Training</button>
        <button class="tab-btn" data-tab="logs">Logs</button>
        <button class="tab-btn" data-tab="settings">Settings</button>
      </div>
    </div>
    <div class="tab-content active" id="tab-history">
      <div id="history-list" class="history-list"></div>
    </div>
    <div class="tab-content" id="tab-compare">
      <div id="compare-content" class="compare-content"></div>
    </div>
    <div class="tab-content" id="tab-lth">
      <div id="lth-list" class="positions-list"></div>
    </div>
    <div class="tab-content" id="tab-training">
      <div id="training-list" class="training-list"></div>
    </div>
    <div class="tab-content" id="tab-logs">
      <div class="log-controls">
        <select id="log-source">
          <option value="neural">Neural Runner</option>
        </select>
        <button class="btn btn-small" id="btn-refresh-logs">Refresh</button>
      </div>
      <pre id="log-output" class="log-output"></pre>
    </div>
    <div class="tab-content" id="tab-settings">
      <div id="settings-form" class="settings-form"></div>
    </div>
  </section>
</main>

<!-- ── Mobile Nav ── -->
<nav id="mobile-nav">
  <button class="mnav-btn active" data-view="signals"><span class="mnav-icon">◈</span>Signals</button>
  <button class="mnav-btn" data-view="chart"><span class="mnav-icon">◆</span>Chart</button>
  <button class="mnav-btn" data-view="trades"><span class="mnav-icon">⬡</span>Trades</button>
  <button class="mnav-btn" data-view="settings"><span class="mnav-icon">⬢</span>More</button>
</nav>

<script src="/static/app.js"></script>
</body>
</html>
